---
# yamllint disable rule:line-length
name: Benchmarks

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    # labeled fires for any label; the job-level `if` filters to run-benchmark
    types:
      - labeled

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: >-
    benchmark-${{ github.workflow }}-
    ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: ASV Continuous (HEAD vs base)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'run-benchmark')
    runs-on: ubuntu-latest
    timeout-minutes: 110

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ccache
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y ccache
          echo "/usr/lib/ccache" >> $GITHUB_PATH

      - name: Cache ccache files
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-asv-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-asv-${{ runner.os }}-

      - name: Install ASV and build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install asv virtualenv pyperf Cython build packaging

      - name: Set threading parameters for reliable benchmarking
        run: |
          echo "OPENBLAS_NUM_THREADS=1" >> $GITHUB_ENV
          echo "MKL_NUM_THREADS=1"      >> $GITHUB_ENV
          echo "OMP_NUM_THREADS=1"      >> $GITHUB_ENV

      - name: Configure ASV machine
        run: |
          asv machine --yes \
            --config ${GITHUB_WORKSPACE}/benchmarks/asv.conf.json

      - name: Run ASV continuous (HEAD vs base)
        env:
          BASE_REF: ${{ github.base_ref || 'master' }}
        run: |
          set -o pipefail
          cd ${GITHUB_WORKSPACE}
          asv continuous \
            --config benchmarks/asv.conf.json \
            --factor 1.1 \
            --show-stderr \
            "origin/${BASE_REF}" HEAD \
            2>/tmp/asv_stderr.txt | tee /tmp/asv_output.txt

      - name: Generate comparison summary
        id: compare
        if: always()
        env:
          BASE_REF: ${{ github.base_ref || 'master' }}
        run: |
          cd ${GITHUB_WORKSPACE}
          BASE_HASH=$(git rev-parse "origin/${BASE_REF}")
          HEAD_HASH=$(git rev-parse HEAD)
          asv compare \
            --config benchmarks/asv.conf.json \
            --factor 1.1 \
            --split \
            "${BASE_HASH}" "${HEAD_HASH}" \
            > /tmp/asv_compare.txt 2>&1 || true

      - name: Load comparison output into env
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "COMPARISON<<ASV_RESULTS_EOF"
            cat /tmp/asv_compare.txt
            echo "ASV_RESULTS_EOF"
          } >> $GITHUB_ENV

      - name: Post results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: asv-benchmark-results
          message: |
            ## ASV Benchmark Results - base vs HEAD
            <details>
            <summary>Click to expand full comparison</summary>

            ${{ env.COMPARISON }}

            </details>

            > **Legend:** + regression / - improvement / +-10% = no change
            > [Full logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Upload raw results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: asv-results-${{ github.sha }}
          path: |
            benchmarks/results/
            /tmp/asv_output.txt
            /tmp/asv_compare.txt
            /tmp/asv_stderr.txt
          retention-days: 30
