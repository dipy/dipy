name: Build docs

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[optional]
        pip install .[doc]
    - name: Build documentation
      run: |
        cd doc
        make -C . html-no-examples SPHINXOPTS="-W --keep-going"
    - name: Deploy dev docs to docs.dipy.org
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      env:
        DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
      run: |
        git clone --depth=1 \
          "https://x-access-token:${DOCS_DEPLOY_TOKEN}@github.com/dipy/docs.dipy.org.git" \
          _deploy
        # Sync everything into dev/ but preserve the pre-built examples_built/
        # directory (tutorials are not rebuilt by html-no-examples).
        rsync -a --delete \
          --exclude='examples_built/' \
          doc/_build/html/ _deploy/dev/
        cd _deploy
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        SHORT_SHA=$(cd .. && git rev-parse --short HEAD)
        git diff --cached --quiet \
          || git commit -m "DOC: update dev docs from dipy/dipy@${SHORT_SHA}"
        git push
